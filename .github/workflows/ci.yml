name: ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.9.10

      - name: Run Ruff lint
        run: |
          ruff check .

      - name: Run Ruff format check
        run: |
          ruff format --check .

  test-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov==5.0.0

      - name: Run full pytest suite with coverage gate
        run: |
          pytest tests --cov=app --cov-fail-under=75

  frontend:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run frontend typecheck
        run: npm run typecheck

      - name: Build frontend bundles
        run: npm run build

  docker-smoke:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Smoke-build Docker image
        run: docker build --tag ipocket:ci-smoke .

  docker-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute build metadata
        id: build_meta
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            IPOCKET_VERSION=${{ github.ref_name }}
            IPOCKET_COMMIT=${{ github.sha }}
            IPOCKET_BUILD_TIME=${{ steps.build_meta.outputs.build_time }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ipocket:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ipocket:latest
