{% extends "base.html" %}

{% block content %}
<div
  id="hosts-root"
  class="hosts-root"
  data-endpoint="/api/ui/hosts"
  data-initial-query="{{ initial_query|default('') }}"
  aria-live="polite"
>
  <section class="page-header">
    <div>
      <p class="eyebrow">Inventory</p>
      <h1>Hosts</h1>
      <p class="subtitle">Track physical hosts and linked OS/BMC addresses.</p>
    </div>
  </section>
</div>
<script id="hosts-bootstrap" type="application/json">{{ hosts_bootstrap|default(none)|tojson }}</script>
{% if errors %}
<noscript>
  <div class="alert alert-error">
    <ul>{% for error in errors %}<li>{{ error }}</li>{% endfor %}</ul>
  </div>
</noscript>
{% endif %}
{% if delete_errors %}
<noscript>
  <div class="alert alert-error">
    <ul>{% for error in delete_errors %}<li>{{ error }}</li>{% endfor %}</ul>
  </div>
</noscript>
{% endif %}
<script type="module" src="/static/react/hosts/hosts.js"></script>
{% endblock %}
