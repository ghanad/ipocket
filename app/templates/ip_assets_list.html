{% extends "base.html" %}

{% block content %}
<div
  id="ip-assets-root"
  class="ip-assets-root"
  data-endpoint="/api/ui/ip-assets"
  data-initial-query="{{ initial_query|default('') }}"
  aria-live="polite"
>
  <section class="page-header">
    <div>
      <p class="eyebrow">Inventory</p>
      <h1>IP Assets</h1>
      <p class="subtitle">Manage and monitor network address assignments across all zones.</p>
    </div>
  </section>
  <section class="card empty-state" role="status">Loading IP assets…</section>
</div>
<script type="module" src="/static/react/ip-assets/ip-assets.js"></script>
{% endblock %}
