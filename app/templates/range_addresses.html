{% extends "base.html" %}

{% block content %}
<div
  id="range-addresses-root"
  class="range-addresses-root"
  data-endpoint="/api/ui/ranges/{{ ip_range.id }}/addresses"
  data-range-id="{{ ip_range.id }}"
  data-initial-query="{{ initial_query }}"
  aria-live="polite"
>
  <section class="page-header">
    <div>
      <h1>{{ ip_range.name }}</h1>
      <p class="subtitle">CIDR {{ ip_range.cidr }}</p>
    </div>
  </section>
</div>
{% if errors %}
<noscript>
  <div class="alert alert-error">
    <ul>
      {% for error in errors %}
      <li>{{ error }}</li>
      {% endfor %}
    </ul>
  </div>
</noscript>
{% endif %}
<script type="module" src="/static/react/range-addresses/range-addresses.js"></script>
{% endblock %}
