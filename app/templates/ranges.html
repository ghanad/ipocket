{% extends "base.html" %}

{% block content %}
<div
  id="ranges-root"
  class="ranges-root"
  data-endpoint="/api/ui/ranges"
  data-initial-edit-id="{{ initial_edit_id or '' }}"
  data-initial-delete-id="{{ initial_delete_id or '' }}"
  aria-live="polite"
>
  <section class="page-header">
    <div>
      <h1>IP Ranges</h1>
      <p class="page-subtitle">Define CIDR ranges and review utilization across active IP assets.</p>
    </div>
  </section>
</div>
<script id="ranges-bootstrap" type="application/json">{{ ranges_bootstrap|default(none)|tojson }}</script>
{% if ranges_bootstrap and ranges_bootstrap.errors %}
<noscript>
  <div class="alert alert-error">
    <ul>
      {% for error in ranges_bootstrap.errors %}
      <li>{{ error }}</li>
      {% endfor %}
    </ul>
  </div>
</noscript>
{% endif %}
<script type="module" src="/static/react/ranges/ranges.js"></script>
{% endblock %}
