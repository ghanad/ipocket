{% extends "base.html" %}

{% block content %}
<div
  id="users-root"
  class="users-root"
  data-endpoint="/api/ui/users"
  aria-live="polite"
>
  <section class="page-header">
    <div>
      <p class="eyebrow">Access</p>
      <h1>User Management</h1>
      <p class="subtitle">Create users and manage editor access. This page is restricted to superusers.</p>
    </div>
  </section>
</div>
<script id="users-bootstrap" type="application/json">
{% if legacy_mode %}
{{ {"mode": legacy_mode, "errors": legacy_errors, "form": legacy_form}|tojson }}
{% else %}
null
{% endif %}
</script>
{% if legacy_errors %}
<noscript>
  <div class="alert alert-error">
    <ul>{% for error in legacy_errors %}<li>{{ error }}</li>{% endfor %}</ul>
  </div>
</noscript>
{% endif %}
<script type="module" src="/static/react/users/users.js"></script>
{% endblock %}
